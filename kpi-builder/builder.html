<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Builder - Mastiyo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="layout-panel">
  <aside class="sidebar"><div class="sidebar-logo">📊 Mastiyo</div><nav class="sidebar-nav"><a href="builder.html" class="nav-item active"><span class="icon">🎯</span> Builder</a><a href="templates.html" class="nav-item"><span class="icon">📑</span> Templates</a><a href="my-kpis.html" class="nav-item"><span class="icon">📋</span> My KPIs</a></nav></aside>
  <div class="main-content">
    <header class="topbar"><div class="breadcrumb">Customization • <strong>KPI Builder</strong></div><div class="topbar-right"><div class="notif-bell">🔔</div><div class="user-avatar">JD</div></div></header>
    <div class="page-content">
      <h1 class="page-title">Create Custom KPI</h1>
      <p class="page-subtitle">Build a KPI without coding • Real-time preview</p>

      <div class="grid-2-1">
        <!-- Left: Builder -->
        <div class="card">
          <h3>KPI Configuration</h3>
          <div class="form-group">
            <label class="form-label required">KPI Name</label>
            <input type="text" class="form-control" placeholder="e.g., Monthly Revenue Growth">
          </div>
          <div class="form-group">
            <label class="form-label required">Description</label>
            <textarea class="form-control" rows="2" placeholder="What does this KPI measure?"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label required">Data Source</label>
            <select class="form-control">
              <option>Select table...</option>
              <option>Invoices</option>
              <option>Sales Orders</option>
              <option>Transactions</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label required">Metric Field</label>
            <select class="form-control">
              <option>Select field...</option>
              <option>amount (SUM)</option>
              <option>quantity (SUM)</option>
              <option>count (COUNT)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Aggregation</label>
            <select class="form-control">
              <option>SUM</option>
              <option>AVG</option>
              <option>COUNT</option>
              <option>MAX</option>
              <option>MIN</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Time Period</label>
            <select class="form-control">
              <option>Monthly</option>
              <option>Quarterly</option>
              <option>Annual</option>
              <option>YTD</option>
            </select>
          </div>
          <div style="text-align: center; gap: 1rem; display: flex;">
            <button class="btn btn-secondary" onclick="alert('Draft saved')">Save Draft</button>
            <button class="btn btn-primary" onclick="alert('KPI published')">Publish</button>
          </div>
        </div>

        <!-- Right: Preview -->
        <div class="card">
          <h3>Preview</h3>
          <div style="background: var(--bg); padding: 2rem; border-radius: var(--radius); text-align: center;">
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Monthly Revenue Growth</div>
            <div style="font-size: 2.5rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem;">Rp 27.5B</div>
            <div style="color: var(--success); font-weight: 600;">↑ 18.5% vs last month</div>
          </div>
          <div style="margin-top: 1.5rem;">
            <strong style="display: block; margin-bottom: 0.5rem;">12-Month Trend</strong>
            <div class="chart-container"><div class="chart-placeholder">📊 Historical trend visualization</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
