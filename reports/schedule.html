<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Schedule - Mastiyo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="layout-panel">
  <aside class="sidebar"><div class="sidebar-logo">📊 Mastiyo</div><nav class="sidebar-nav"><a href="schedule.html" class="nav-item active"><span class="icon">⏰</span> Schedule</a></nav></aside>
  <div class="main-content">
    <header class="topbar"><div class="breadcrumb">Reports • <strong>Schedule</strong></div><div class="topbar-right"><div class="notif-bell">🔔</div><div class="user-avatar">JD</div></div></header>
    <div class="page-content">
      <h1 class="page-title">Scheduled Reports</h1>
      <p class="page-subtitle"><button class="btn btn-primary" onclick="alert('New schedule created')">+ New Schedule</button></p>

      <div class="card">
        <table style="font-size: 0.9rem;">
          <thead><tr><th>Report</th><th>Frequency</th><th>Send Time</th><th>Recipients</th><th>Status</th></tr></thead>
          <tbody>
            <tr><td><strong>Monthly P&L</strong></td><td>Monthly</td><td>1st, 10:00 AM</td><td>CFO, Finance team</td><td><span class="badge badge-success">✓ Active</span></td></tr>
            <tr><td><strong>Sales Summary</strong></td><td>Weekly</td><td>Mon, 9:00 AM</td><td>Sales Manager</td><td><span class="badge badge-success">✓ Active</span></td></tr>
            <tr><td><strong>Customer Analysis</strong></td><td>Monthly</td><td>5th, 2:00 PM</td><td>Marketing team</td><td><span class="badge badge-success">✓ Active</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
