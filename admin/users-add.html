<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add User - Mastiyo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="layout-panel">
  
  <aside class="sidebar">
    <div class="sidebar-logo">📊 Mastiyo</div>
    <div class="sidebar-role">OWNER</div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="../dashboard/main.html" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <div class="nav-section">Management</div>
      <a href="users-list.html" class="nav-item active">
        <span class="icon">👥</span> Users
      </a>
      <a href="companies-list.html" class="nav-item">
        <span class="icon">🏢</span> Companies
      </a>
      <a href="roles-list.html" class="nav-item">
        <span class="icon">👮</span> Roles
      </a>
      <div class="nav-section">Operations</div>
      <a href="audit-logs.html" class="nav-item">
        <span class="icon">📋</span> Audit Logs
      </a>
      <div class="nav-section">Account</div>
      <a href="../settings/profile.html" class="nav-item">
        <span class="icon">⚙️</span> Settings
      </a>
      <a href="../auth/login.html" class="nav-item">
        <span class="icon">🚪</span> Logout
      </a>
    </nav>
  </aside>

  <div class="main-content">
    
    <header class="topbar">
      <div class="breadcrumb"><a href="users-list.html">Users</a> • <strong>Add New User</strong></div>
      <div class="topbar-right">
        <div class="notif-bell">🔔</div>
        <div class="user-avatar">JD</div>
      </div>
    </header>

    <div class="page-content">
      
      <h1 class="page-title">Invite New User</h1>
      <p class="page-subtitle">Send invitation to new team member</p>

      <div style="max-width: 600px;">
        
        <form id="addUserForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
          
          <div class="card">
            <h3 style="margin-bottom: 1.5rem; color: var(--primary);">User Information</h3>
            
            <div class="form-group">
              <label class="form-label required">First Name</label>
              <input type="text" class="form-control" placeholder="John" required>
            </div>

            <div class="form-group">
              <label class="form-label required">Last Name</label>
              <input type="text" class="form-control" placeholder="Doe" required>
            </div>

            <div class="form-group">
              <label class="form-label required">Email Address</label>
              <input type="email" class="form-control" placeholder="john@company.com" required>
              <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">
                Invitation will be sent to this email
              </div>
            </div>

            <div class="form-group">
              <label class="form-label required">Phone Number</label>
              <input type="tel" class="form-control" placeholder="+62 812 xxxx xxxx">
            </div>
          </div>

          <div class="card">
            <h3 style="margin-bottom: 1.5rem; color: var(--primary);">Role Assignment</h3>
            
            <div class="form-group">
              <label class="form-label required">Primary Role</label>
              <select class="form-control" required>
                <option value="">Select a role</option>
                <option value="OWNER">OWNER - Full access to organization</option>
                <option value="CFO">CFO - Financial data access</option>
                <option value="MANAGER">COMPANY_MANAGER - Single company management</option>
                <option value="SALES">SALES_MANAGER - Sales & pipeline</option>
                <option value="VIEWER">VIEWER - Read-only access</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label required">Assign to Companies</label>
              <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label class="form-check-label">
                  <input type="checkbox" class="form-checkbox" value="1" checked>
                  PT APM (Laboratory Equipment)
                </label>
                <label class="form-check-label">
                  <input type="checkbox" class="form-checkbox" value="2">
                  PT Maju Jaya (Manufacturing)
                </label>
                <label class="form-check-label">
                  <input type="checkbox" class="form-checkbox" value="3">
                  CV Sentosa (Services)
                </label>
              </div>
            </div>
          </div>

          <div class="card">
            <h3 style="margin-bottom: 1.5rem; color: var(--primary);">Access Level</h3>
            
            <div class="form-group">
              <label class="form-label">For each company:</label>
              <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <label class="form-check-label">
                  <input type="radio" name="access" class="form-radio" value="full" checked>
                  Full Access
                </label>
                <label class="form-check-label">
                  <input type="radio" name="access" class="form-radio" value="limited">
                  Limited Access
                </label>
                <label class="form-check-label">
                  <input type="radio" name="access" class="form-radio" value="readonly">
                  Read-Only
                </label>
              </div>
            </div>
          </div>

          <div class="card" style="background: var(--accent-light); border: 1px solid var(--warning);">
            <div class="form-check-label">
              <input type="checkbox" class="form-checkbox" id="sendEmail" checked>
              <label for="sendEmail" style="margin: 0; cursor: pointer;">
                <strong>Send invitation email</strong> - User will receive link to set password
              </label>
            </div>
          </div>

          <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
              Send Invitation
            </button>
            <a href="users-list.html" class="btn btn-secondary" style="flex: 1; text-align: center;">
              Cancel
            </a>
          </div>

        </form>

      </div>

    </div>

  </div>

  <script>
    document.getElementById('addUserForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('✅ Invitation sent successfully!');
      window.location.href = 'users-list.html';
    });
  </script>

</body>
</html>
