<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mastiyo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="layout-public">
  
  <header class="pub-header">
    <div class="logo">📊 Mastiyo</div>
    <a href="../index.html" class="btn btn-outline" style="color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3);">Back to Home</a>
  </header>

  <main style="display: flex; align-items: center; justify-content: center; flex: 1;">
    
    <div class="card" style="max-width: 400px; width: 100%; box-shadow: var(--shadow-md);">
      
      <h1 style="text-align: center; margin-bottom: 0.5rem;">Sign In</h1>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Access your Mastiyo account</p>

      <form id="loginForm" style="display: flex; flex-direction: column; gap: 1rem;">
        
        <div class="form-group">
          <label class="form-label required">Email Address</label>
          <input 
            type="email" 
            class="form-control" 
            placeholder="owner@ptapm.com"
            value="owner@ptapm.com"
            required>
        </div>

        <div class="form-group">
          <label class="form-label required">Password</label>
          <input 
            type="password" 
            class="form-control" 
            placeholder="••••••••"
            value="password123"
            required>
        </div>

        <div class="form-check-label">
          <input type="checkbox" class="form-checkbox" id="remember">
          <label for="remember" style="margin: 0; cursor: pointer;">Remember me for 30 days</label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem; margin-top: 0.5rem;">
          Sign In
        </button>

      </form>

      <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
        <p style="margin-bottom: 1rem;">
          <a href="forgot-password.html" style="color: var(--primary-light); font-weight: 600;">Forgot your password?</a>
        </p>
        <p style="color: var(--text-muted);">
          Don't have an account? <a href="register.html" style="color: var(--primary-light); font-weight: 600;">Create one now</a>
        </p>
      </div>

      <!-- Demo Info -->
      <div class="alert alert-info" style="margin-top: 1.5rem; font-size: 0.85rem;">
        <span>ℹ️</span>
        <div>
          <strong>Demo Credentials:</strong><br>
          Email: owner@ptapm.com<br>
          Password: password123
        </div>
      </div>

    </div>

  </main>

  <footer style="background: var(--primary); color: white; text-align: center; padding: 1.5rem;">
    <p>© 2026 Mastiyo. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('✅ Login successful! Redirecting to dashboard...');
      window.location.href = '../dashboard/main.html';
    });
  </script>

</body>
</html>
