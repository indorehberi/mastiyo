<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Builder - Mastiyo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="layout-panel">
  <aside class="sidebar"><div class="sidebar-logo">📊 Mastiyo</div><nav class="sidebar-nav"><a href="builder.html" class="nav-item active"><span class="icon">🎨</span> Builder</a><a href="gallery.html" class="nav-item"><span class="icon">🖼️</span> Gallery</a><a href="my-dashboards.html" class="nav-item"><span class="icon">📋</span> My Dashboards</a></nav></aside>
  <div class="main-content">
    <header class="topbar"><div class="breadcrumb">Customization • <strong>Dashboard Builder</strong></div><div class="topbar-right"><div class="notif-bell">🔔</div><div class="user-avatar">JD</div></div></header>
    <div class="page-content">
      <h1 class="page-title">Create Dashboard</h1>
      <p class="page-subtitle">Drag-drop builder • 20+ widget types</p>

      <div style="display: grid; grid-template-columns: 1fr 200px; gap: 1.5rem;">
        <!-- Canvas -->
        <div class="card">
          <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <input type="text" class="form-control" placeholder="Dashboard name..." style="flex: 1;">
            <button class="btn btn-secondary" onclick="alert('Settings saved')">Save</button>
            <button class="btn btn-primary" onclick="alert('Dashboard published')">Publish</button>
          </div>
          <div style="background: #f9fafb; border: 2px dashed var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; min-height: 400px;">
            <div style="color: var(--text-muted);">📐 Drag widgets here</div>
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">or select from components →</div>
          </div>
        </div>

        <!-- Widgets -->
        <div class="card">
          <h4 style="margin-bottom: 1rem;">Widgets</h4>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">📊 KPI Card</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">📈 Chart</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">📋 Table</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">📍 Map</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">⚠️ Alert</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">📝 Text</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">🔘 Gauge</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; justify-content: flex-start; font-size: 0.8rem;">🔥 Heatmap</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
